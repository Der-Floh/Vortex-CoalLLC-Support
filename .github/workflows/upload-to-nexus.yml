name: Build and Publish to Nexus Mods

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build and package extension
        run: npm run package

      - name: Read package metadata
        id: pkg
        shell: bash
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          display_name=$(node -p "require('./package.json').displayName")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "display_name=$display_name" >> "$GITHUB_OUTPUT"
          echo "zip_path=dist/$name-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Verify packaged file exists
        run: |
          test -f "${{ steps.pkg.outputs.zip_path }}"
          ls -lh "${{ steps.pkg.outputs.zip_path }}"

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip_path }}

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: 7457144
          filename: ${{ steps.pkg.outputs.zip_path }}
          version: ${{ steps.pkg.outputs.version }}
          display_name: "${{ steps.pkg.outputs.display_name }} Support v${{ steps.pkg.outputs.version }}"
          description: Adds support for ${{ steps.pkg.outputs.display_name }} to Vortex
          file_category: main
